server:
  port: 8080

spring:
  application:
    name: edge-video-analysis
  
  # MySQL配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/edge_video_analysis?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
        default-requeue-rejected: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.edgevideoanalysis.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j API文档配置
knife4j:
  enable: true
  setting:
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: "EdgeVideoAnalysis | 省一作品"

# MQTT配置
mqtt:
  broker-url: tcp://localhost:1883
  client-id: eva-backend-${random.uuid}
  command-topic-prefix: eva/device
  qos: 1
  connection-timeout: 10
  keep-alive-interval: 60

# AI推理服务配置
ai:
  yolov8:
    url: http://localhost:5000/inference

# 日志配置
logging:
  level:
    root: INFO
    com.edgevideoanalysis: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
